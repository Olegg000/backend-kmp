# Test Configuration (uses H2 in-memory database)

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop # Пересоздаем схему для каждого теста
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        show_sql: false

  # 🔥 КРИТИЧЕСКИ ВАЖНО: Отключаем data.sql для тестов
  sql:
    init:
      mode: never  # Не загружать data.sql в тестах!

  h2:
    console:
      enabled: true

jwt:
  secret: TestSecretKeyForJWTTokensInTestEnvironment1234567890
  lifetime: 86400000

logging:
  level:
    root: WARN
    com.example.demo: DEBUG
    org.springframework.security: WARN