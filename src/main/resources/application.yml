server:
  port: 8080

spring:
  application:
    name: pgk-food-backend

  datasource:
    url: ${DB_HOST}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
      connection-timeout: 5000
      max-lifetime: 1800000
      idle-timeout: 600000

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false # Отключаем в production
    open-in-view: false # Best practice

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  lifetime: 86400000 # 24 часа

# Logging
logging:
  level:
    root: INFO
    com.example.demo: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} [requestId:%X{requestId:-}] - %msg%n%wEx"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [requestId:%X{requestId:-}] - %msg%n%wEx"
  file:
    name: logs/app.log
    max-size: 10MB
    max-history: 30

# Actuator (для мониторинга в production)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  business-zone: ${APP_BUSINESS_ZONE:Europe/Samara}

security:
  qr-offline-public: ${SECURITY_QR_OFFLINE_PUBLIC:false}
  rate-limit:
    enabled: true
    use-forwarded-ip: ${SECURITY_RATE_LIMIT_USE_FORWARDED_IP:false}
    login-per-minute: ${SECURITY_RATE_LIMIT_LOGIN_PER_MINUTE:60}
    qr-per-minute: ${SECURITY_RATE_LIMIT_QR_PER_MINUTE:600}
    batch-per-minute: ${SECURITY_RATE_LIMIT_BATCH_PER_MINUTE:300}
