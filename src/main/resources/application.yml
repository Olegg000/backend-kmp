server:
  port: 8080

spring:
  application:
    name: pgk-food-backend

  datasource:
    url: ${DB_HOST}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
      connection-timeout: 5000
      max-lifetime: 1800000
      idle-timeout: 600000

  sql:
    init:
      mode: never

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false # Отключаем в production
    open-in-view: false # Best practice

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  lifetime: 86400000 # 24 часа

# Logging
logging:
  level:
    root: INFO
    com.example.demo: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} [requestId:%X{requestId:-}] - %msg%n%wEx"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [requestId:%X{requestId:-}] - %msg%n%wEx"
  file:
    name: logs/app.log
    max-size: 10MB
    max-history: 30

# Actuator (для мониторинга в production)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  business-zone: ${APP_BUSINESS_ZONE:Europe/Samara}
  test-mode:
    enabled: ${APP_TEST_MODE_ENABLED:false}
  push:
    enabled: ${APP_PUSH_ENABLED:true}
    firebase:
      service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
      service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
  bootstrap-admin:
    enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:true}
    login: ${BOOTSTRAP_ADMIN_LOGIN:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    name: ${BOOTSTRAP_ADMIN_NAME:Системный}
    surname: ${BOOTSTRAP_ADMIN_SURNAME:Администратор}
    father-name: ${BOOTSTRAP_ADMIN_FATHER_NAME:Служебный}
    group-name: ${BOOTSTRAP_ADMIN_GROUP_NAME:101}
  retention:
    enabled: ${APP_RETENTION_ENABLED:true}
    batch-size: ${APP_RETENTION_BATCH_SIZE:1000}
    meal-days: ${APP_RETENTION_MEAL_DAYS:365}
    weekly-days: ${APP_RETENTION_WEEKLY_DAYS:365}
    notifications-days: ${APP_RETENTION_NOTIFICATIONS_DAYS:90}
    dispatch-log-days: ${APP_RETENTION_DISPATCH_LOG_DAYS:60}
    password-reset-days: ${APP_RETENTION_PASSWORD_RESET_DAYS:90}
    suspicious-resolved-days: ${APP_RETENTION_SUSPICIOUS_RESOLVED_DAYS:365}
    inactive-push-token-days: ${APP_RETENTION_INACTIVE_PUSH_TOKEN_DAYS:120}

security:
  qr-offline-public: ${SECURITY_QR_OFFLINE_PUBLIC:false}
  rate-limit:
    enabled: true
    use-forwarded-ip: ${SECURITY_RATE_LIMIT_USE_FORWARDED_IP:false}
    login-per-minute: ${SECURITY_RATE_LIMIT_LOGIN_PER_MINUTE:60}
    qr-per-minute: ${SECURITY_RATE_LIMIT_QR_PER_MINUTE:600}
    batch-per-minute: ${SECURITY_RATE_LIMIT_BATCH_PER_MINUTE:300}
